name: Android APK Cloud Compiler

on:
  push:
    branches: [ "v1.0.0" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant Execute Permission for Gradle Wrapper
      run: chmod +x gradlew

    - name: Auto-Inject Image Assets
      run: |
        echo "🔍 Checking for image.png in root directory..."
        if [ -f "image.png" ]; then
          mkdir -p app/src/main/res/drawable
          # ... (baki directories)
          sudo apt-get update
          sudo apt-get install -y imagemagick
          convert image.png -alpha set -virtual-pixel transparent -channel A -morphology Distance Euclidean:1,10! +channel -format png -resize 512x512 app/src/main/res/drawable/rounded_image_rounded.png
        else
          echo "⚠️ No image.png found in root, skipping..."
        fi

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: H7sKER-TOOL
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
