name: Android APK Cloud Compiler

on:
  push:
    branches: [ "v1.0.0" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Grant Execute Permission for Gradle Wrapper
      run: chmod +x gradlew

    - name: Force Fix Gradle Wrapper
      run: |
        echo "🔄 Ensuring gradle-wrapper.jar is valid..."
        rm -rf gradle/wrapper/gradle-wrapper.jar
        curl -L https://raw.githubusercontent.com/gradle/gradle/v8.6/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
        chmod +x gradle/wrapper/gradle-wrapper.jar

    - name: Auto-Inject Image Assets
      run: |
        if [ -f "image.png" ]; then
          echo "Processing images..."
          mkdir -p app/src/main/res/drawable app/src/main/res/mipmap-mdpi app/src/main/res/mipmap-hdpi app/src/main/res/mipmap-xhdpi app/src/main/res/mipmap-xxhdpi app/src/main/res/mipmap-xxxhdpi
          cp image.png app/src/main/res/drawable/custom_image.png
          cp image.png app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp image.png app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp image.png app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp image.png app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp image.png app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
        else
          echo "image.png not found, skipping..."
        fi

    - name: Build Debug APK
      run: |
        ./gradlew clean assembleDebug --stacktrace --no-daemon

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: H7sKER-TOOL
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7

