Name: Android APK Cloud Compiler

on:
  push:
    branches: [ v1.0.0 ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant Execute Permission for Gradle Wrapper
      run: chmod +x gradlew

    # ✅ Verify gradle-wrapper.jar exists
    - name: Verify Gradle Wrapper JAR
      run: |
        echo "🔍 Checking gradle-wrapper.jar location..."
        if [ -f "gradle/wrapper/gradle-wrapper.jar" ]; then
          echo "✅ gradle-wrapper.jar found at: gradle/wrapper/gradle-wrapper.jar"
          ls -la gradle/wrapper/gradle-wrapper.jar
        else
          echo "❌ gradle-wrapper.jar NOT found!"
          echo "📁 Contents of gradle/wrapper/:"
          ls -la gradle/wrapper/ || echo "Directory empty or not exists"
          exit 1
        fi

    # ✅ NEW STEP: Auto-detect and inject image.png
    - name: Auto-Inject Image Assets
      run: |
        echo "🔍 Checking for image.png in root directory..."
        if [ -f "image.png" ]; then
          echo "✅ image.png found! Processing..."
          
          # Create required directories
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/drawable-mdpi
          mkdir -p app/src/main/res/drawable-hdpi
          mkdir -p app/src/main/res/drawable-xhdpi
          mkdir -p app/src/main/res/drawable-xxhdpi
          mkdir -p app/src/main/res/drawable-xxxhdpi
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi
          
          # Copy original image to drawable
          cp image.png app/src/main/res/drawable/custom_image.png
          cp image.png app/src/main/res/drawable/rounded_image.png
          
          # Copy to all mipmap folders for launcher icon
          cp image.png app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp image.png app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp image.png app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp image.png app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp image.png app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          
          # Create rounded corner version
          sudo apt-get update
          sudo apt-get install -y imagemagick
          
          convert image.png -alpha set -virtual-pixel transparent -channel A -morphology Distance Euclidean:1,10! +channel -format png -resize 512x512 app/src/main/res/drawable/rounded_image_rounded.png
          
          echo "✅ Image injected successfully!"
        else
          echo "⚠️ No image.png found in root, skipping..."
        fi

    # ✅ Build with explicit gradle wrapper path
    - name: Build Debug APK with Gradle Cloud Workers
      run: |
        echo "📦 Building APK using gradlew..."
        echo "📍 Using wrapper from: gradle/wrapper/gradle-wrapper.jar"
        ./gradlew assembleDebug --stacktrace

    - name: Upload Finished V1.0.0 APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: H7sKER TOOL
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
